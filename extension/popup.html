<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>findmap</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 18px;
      font-family: "Segoe UI", system-ui, sans-serif;
      text-align: center;
      color: #1e293b;
    }
    h1 { font-size: 16px; margin: 0 0 8px; }
    p { font-size: 12px; color: #64748b; line-height: 1.45; margin: 0 0 14px; }
    a.open-link {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    a.open-link:hover { background: #1d4ed8; }
    .url-hint {
      margin-top: 10px;
      font-size: 11px;
      color: #94a3b8;
      word-break: break-all;
    }
    #statusLine {
      font-size: 12px;
      color: #0f766e;
      margin-bottom: 12px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>findmap</h1>
  <p>Extension tự kết nối mọi domain trang Findmap ở nền. Không cần kích hoạt tay.</p>
  <div id="statusLine">Đang kiểm tra…</div>
  <a id="openWebLink" class="open-link" href="https://app.findmap.vn" target="_blank" rel="noopener">Mở trang kết quả</a>
  <div class="url-hint" id="openWebHint">app.findmap.vn</div>

  <script src="app-config.js"></script>
  <script>
    (function () {
      var FALLBACK = "https://app.findmap.vn";
      var origin = (window.TIMDIEMBAN_CONFIG && window.TIMDIEMBAN_CONFIG.APP_ORIGIN) || FALLBACK;
      origin = String(origin || FALLBACK).replace(/\/$/, "");
      if (!/^https?:\/\//i.test(origin)) origin = FALLBACK;

      var link = document.getElementById("openWebLink");
      var hint = document.getElementById("openWebHint");
      var statusEl = document.getElementById("statusLine");

      function setPreferred(url) {
        var preferred = String(url || origin).replace(/\/$/, "");
        if (link) link.href = preferred;
        if (hint) hint.textContent = preferred.replace(/^https?:\/\//, "");
      }

      chrome.runtime.sendMessage({ action: "GET_WEB_ORIGINS" }, function (resp) {
        if (!chrome.runtime.lastError && resp) {
          setPreferred(resp.preferred || resp.config || origin);
        }
      });

      // Mở popup: gắn lại bridge tab hiện tại (ngầm) + báo trạng thái
      chrome.runtime.sendMessage({ action: "CONNECT_WEB_SITE" }, function (resp) {
        if (chrome.runtime.lastError) {
          if (statusEl) statusEl.textContent = "Chạy ngầm — mở trang Findmap để tự kết nối.";
          return;
        }
        if (resp && resp.ok) {
          if (statusEl) statusEl.textContent = "Đã kết nối: " + (resp.origin || "OK");
          if (resp.origin) setPreferred(resp.origin);
        } else {
          if (statusEl) statusEl.textContent = "Sẵn sàng — mở tab trang tìm điểm bán.";
        }
      });

      if (link) {
        link.addEventListener("click", function (e) {
          e.preventDefault();
          var url = link.href || origin;
          try {
            if (chrome && chrome.tabs && chrome.tabs.create) {
              chrome.tabs.create({ url: url });
              return;
            }
          } catch (_) {}
          window.open(url, "_blank");
        });
      }
    })();
  </script>
</body>
</html>
