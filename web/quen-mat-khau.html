<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quên mật khẩu — findmap</title>
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/icons/favicon-48.png" type="image/png" sizes="48x48" />
  <link rel="icon" href="/assets/icons/favicon-16.png" type="image/png" sizes="16x16" />
  <link rel="apple-touch-icon" href="/assets/icons/favicon-128.png" />
  <base href="/" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-page">
  <main class="main auth-page-main">
    <div class="admin-card auth-page-card">
      <h1>Quên mật khẩu</h1>
      <p class="admin-hint">Nhập email tài khoản để nhận liên kết đặt lại mật khẩu qua email (hiệu lực 1 giờ).</p>
      <form id="forgotForm">
        <label for="forgotEmail">Email</label>
        <input type="email" id="forgotEmail" required placeholder="email@example.com" />
        <p id="forgotError" class="auth-error hidden"></p>
        <p id="forgotSuccess" class="admin-msg admin-msg-ok hidden"></p>
        <button type="submit" class="btn btn-primary auth-submit">Gửi liên kết qua email</button>
      </form>
      <div class="reset-link-box" style="margin-top:12px">
        <p>Cần hỗ trợ ngay?</p>
        <p><a href="mailto:admin@findmap.local" class="reset-link">Gọi/Hỗ trợ admin</a></p>
      </div>
      <p class="auth-switch"><a href="/">← Quay lại đăng nhập</a></p>
    </div>
  </main>
  <script>
    const form = document.getElementById("forgotForm");
    const forgotError = document.getElementById("forgotError");
    const forgotSuccess = document.getElementById("forgotSuccess");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      forgotError.classList.add("hidden");
      forgotSuccess.classList.add("hidden");
      try {
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: document.getElementById("forgotEmail").value.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Lỗi");
        forgotSuccess.textContent = data.message;
        forgotSuccess.classList.remove("hidden");
      } catch (err) {
        forgotError.textContent = err.message;
        forgotError.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
