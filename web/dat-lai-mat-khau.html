<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt lại mật khẩu — Tim Diem Ban</title>
  <base href="/" />
  <link rel="stylesheet" href="/style.css" /></head>
<body class="auth-page">
  <main class="main auth-page-main">
    <div class="admin-card auth-page-card">
      <h1>Đặt lại mật khẩu</h1>
      <p class="admin-hint">Nhập mật khẩu mới cho tài khoản của bạn.</p>
      <form id="resetForm">
        <label for="newPassword">Mật khẩu mới</label>
        <input type="password" id="newPassword" required minlength="6" />
        <label for="confirmPassword">Nhập lại mật khẩu</label>
        <input type="password" id="confirmPassword" required minlength="6" />
        <p id="resetError" class="auth-error hidden"></p>
        <p id="resetSuccess" class="admin-msg admin-msg-ok hidden"></p>
        <button type="submit" class="btn btn-primary auth-submit">Lưu mật khẩu mới</button>
      </form>
      <p class="auth-switch"><a href="/">← Về trang đăng nhập</a></p>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const resetError = document.getElementById("resetError");
    const resetSuccess = document.getElementById("resetSuccess");

    if (!token) {
      resetError.textContent = "Liên kết không hợp lệ. Vui lòng tạo lại từ trang Quên mật khẩu.";
      resetError.classList.remove("hidden");
      document.getElementById("resetForm").querySelector("button").disabled = true;
    }

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      resetError.classList.add("hidden");
      resetSuccess.classList.add("hidden");
      const pw = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;
      if (pw !== confirm) {
        resetError.textContent = "Mật khẩu nhập lại không khớp";
        resetError.classList.remove("hidden");
        return;
      }
      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password: pw })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Lỗi");
        resetSuccess.textContent = data.message + " Chuyển về trang chính sau 2 giây...";
        resetSuccess.classList.remove("hidden");
        setTimeout(() => { window.location.href = "/"; }, 2000);
      } catch (err) {
        resetError.textContent = err.message;
        resetError.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
