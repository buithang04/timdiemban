<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img">
  <title>Findmap — xuất Excel hoặc gửi sang site nhận dữ liệu</title>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="500" rx="24" fill="url(#bg4)"/>
  <rect x="60" y="90" width="260" height="300" rx="16" fill="#ffffff" filter="url(#sh4)"/>
  <rect x="60" y="90" width="260" height="48" rx="16" fill="#2b59ff"/>
  <rect x="60" y="122" width="260" height="16" fill="#2b59ff"/>
  <text x="84" y="122" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Findmap</text>
  <text x="84" y="170" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b">128 điểm sẵn sàng</text>
  <rect x="84" y="190" width="212" height="12" rx="4" fill="#e2e8f0"/>
  <rect x="84" y="214" width="180" height="12" rx="4" fill="#e2e8f0"/>
  <rect x="84" y="238" width="200" height="12" rx="4" fill="#e2e8f0"/>
  <rect x="84" y="280" width="212" height="40" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="124" y="305" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2b59ff">Xuất Excel</text>
  <rect x="84" y="336" width="212" height="40" rx="10" fill="#2b59ff"/>
  <text x="108" y="361" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Gửi về site đã cấu hình</text>
  <path d="M340 230 H400" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M388 218 L408 230 L388 242" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M340 320 H400" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M388 308 L408 320 L388 332" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="430" y="100" width="140" height="160" rx="12" fill="#ffffff" filter="url(#sh4)"/>
  <rect x="458" y="124" width="84" height="100" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="478" y="180" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#16a34a">XLS</text>
  <text x="455" y="290" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0f172a">File Excel</text>
  <rect x="600" y="220" width="140" height="160" rx="12" fill="#ffffff" filter="url(#sh4)"/>
  <circle cx="670" cy="280" r="36" fill="#eef2ff"/>
  <path d="M654 280h32M670 264v32" stroke="#2b59ff" stroke-width="4" stroke-linecap="round"/>
  <text x="612" y="360" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0f172a">Site nhận dữ liệu</text>
  <text x="60" y="440" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b">Xuất Excel hoặc gửi JSON theo cấu hình site</text>
