# Nginx app.findmap.vn — hệ tìm kiếm (18030) + landing/tin/CMS (18031)
#
# Cài: sudo cp deploy/app.findmap.vn.conf /etc/nginx/sites-available/app.findmap.vn
#      sudo cp deploy/nginx-findmap-landing-map.conf /etc/nginx/conf.d/findmap-landing-map.conf
#      sudo nginx -t && sudo systemctl reload nginx

upstream findmap_search {
    server 127.0.0.1:18030;
    keepalive 8;
}

upstream findmap_landing {
    server 127.0.0.1:18031;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;

    server_name app.findmap.vn;

    client_max_body_size 20M;

    # Proxy chung (dùng map $findmap_use_landing từ conf.d/findmap-landing-map.conf)
    location / {
        error_page 418 = @findmap_landing;
        if ($findmap_use_landing) {
            return 418;
        }
        proxy_pass http://findmap_search;
        include /etc/nginx/snippets/findmap-proxy.conf;
    }

    location @findmap_landing {
        proxy_pass http://findmap_landing;
        include /etc/nginx/snippets/findmap-proxy.conf;
    }
}
