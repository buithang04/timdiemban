# Map: chuyển request landing sang upstream 18031 (include trong http {} của nginx)
#
# Cài: sudo cp deploy/nginx-findmap-landing-map.conf /etc/nginx/conf.d/findmap-landing-map.conf
#      sudo nginx -t && sudo systemctl reload nginx

map $request_uri $findmap_is_root {
    default 0;
    "/" 1;
}

map $request_uri $findmap_is_landing_path {
    default 0;
    ~^/gioi-thieu 1;
    ~^/tin-tuc 1;
    ~^/admin-post- 1;
    ~^/preview-bai-viet 1;
    ~^/login-admin-post 1;
    ~^/media/ 1;
    ~^/landing/ 1;
    ~^/styles\.css$ 1;
    ~^/script\.js$ 1;
    ~^/news-fx\.js$ 1;
    ~^/sitemap\.xml$ 1;
    ~^/api/posts 1;
    ~^/api/categories 1;
    ~^/api/seo/ 1;
    ~^/api/admin/cms/ 1;
    ~^/api/admin/editors 1;
}

# API trùng path giữa hệ tìm kiếm và CMS — phân biệt theo Referer trang landing/CMS
map $http_referer $findmap_is_landing_referer {
    default 0;
    ~*/(gioi-thieu|tin-tuc|admin-post|preview-bai-viet|login-admin-post|$) 1;
}

map "$findmap_is_landing_path:$findmap_is_landing_referer:$request_uri" $findmap_use_landing_paths {
    default 0;
    ~^1: 1;
    ~:1:/api/auth/ 1;
    ~:1:/api/admin/me 1;
    ~:1:/api/config/origins 1;
    ~:1:/app-config\.js 1;
}

# "/" → landing khi chưa đăng nhập; cookie findmap_session=1 → hệ tìm kiếm
map "$findmap_is_root:$cookie_findmap_session" $findmap_root_choice {
    default 2;
    "1:": 1;
    "1:1": 0;
}

map "$findmap_root_choice:$findmap_use_landing_paths" $findmap_use_landing {
    "2:0": 0;
    "2:1": 1;
    "0:0": 0;
    "0:1": 0;
    "1:0": 1;
    "1:1": 1;
}
